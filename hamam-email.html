<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حمام — بريدك العربي</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C8102E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="حمام">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --red: #C8102E;
  --red-dark: #9B0B22;
  --red-light: #F5C6CE;
  --green: #005C2A;
  --green-mid: #00793A;
  --green-light: #E8F5EE;
  --gold: #C49A28;
  --gold-light: #F9F0D7;
  --ink: #1A1A2E;
  --ink2: #2D2D44;
  --text: #333348;
  --muted: #888898;
  --border: #DDDDE8;
  --bg: #F4F4F8;
  --surface: #FFFFFF;
  --surface2: #FAFAFA;
  --sidebar-w: 240px;
  --toolbar-h: 56px;
  --header-h: 64px;
  --shadow: 0 2px 12px rgba(0,0,0,.08);
  --shadow-md: 0 4px 24px rgba(0,0,0,.12);
  --radius: 10px;
  --radius-sm: 6px;
  --font: 'Cairo', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
}

/* ─── HEADER ─── */
#header {
  height: var(--header-h);
  background: var(--red);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 14px;
  position: relative;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(200,16,46,.35);
}
#header .logo {
  display: flex;
  align-items: center;
  gap: 10px;
  color: white;
}
#header .logo-icon {
  width: 38px; height: 38px;
  background: rgba(255,255,255,.18);
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 20px;
}
#header .logo-text {
  font-family: 'Amiri', serif;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: .5px;
  line-height: 1;
}
#header .logo-sub {
  font-size: 11px;
  opacity: .75;
  letter-spacing: .3px;
}
.header-search {
  flex: 1;
  max-width: 400px;
  margin: 0 auto;
  position: relative;
}
.header-search input {
  width: 100%;
  padding: 9px 16px 9px 40px;
  border-radius: 22px;
  border: none;
  background: rgba(255,255,255,.18);
  color: white;
  font-family: var(--font);
  font-size: 13px;
  outline: none;
  transition: background .2s;
}
.header-search input::placeholder { color: rgba(255,255,255,.65); }
.header-search input:focus { background: rgba(255,255,255,.28); }
.header-search .search-icon {
  position: absolute;
  left: 13px; top: 50%;
  transform: translateY(-50%);
  color: rgba(255,255,255,.7);
  font-size: 15px;
  pointer-events: none;
}
.header-actions {
  display: flex; align-items: center; gap: 8px; margin-right: auto;
}
.hbtn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,.15);
  border: none; cursor: pointer; color: white;
  display: grid; place-items: center;
  font-size: 16px;
  transition: background .15s;
  position: relative;
}
.hbtn:hover { background: rgba(255,255,255,.28); }
.hbtn .badge {
  position: absolute; top: 3px; right: 3px;
  width: 9px; height: 9px;
  background: var(--gold);
  border-radius: 50%;
  border: 2px solid var(--red);
}
.avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--green), var(--gold));
  display: grid; place-items: center;
  color: white; font-weight: 700; font-size: 15px;
  cursor: pointer; border: 2px solid rgba(255,255,255,.4);
}

/* ─── LAYOUT ─── */
#app {
  display: flex;
  height: calc(100vh - var(--header-h));
  overflow: hidden;
}

/* ─── SIDEBAR ─── */
#sidebar {
  width: var(--sidebar-w);
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}
.compose-btn {
  margin: 16px 14px 10px;
  padding: 11px 16px;
  background: var(--red);
  color: white;
  border: none;
  border-radius: 24px;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 3px 10px rgba(200,16,46,.3);
  transition: background .15s, transform .12s, box-shadow .15s;
}
.compose-btn:hover {
  background: var(--red-dark);
  transform: translateY(-1px);
  box-shadow: 0 5px 16px rgba(200,16,46,.38);
}
.compose-btn:active { transform: translateY(0); }

.sidebar-nav { flex: 1; overflow-y: auto; padding: 4px 0; }
.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.nav-section { padding: 14px 16px 6px; font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.nav-item {
  display: flex; align-items: center;
  padding: 9px 16px;
  cursor: pointer;
  border-radius: var(--radius-sm);
  margin: 1px 6px;
  gap: 10px;
  color: var(--text);
  transition: background .1s;
  font-size: 13.5px;
  font-weight: 600;
  position: relative;
}
.nav-item:hover { background: var(--bg); }
.nav-item.active {
  background: var(--red-light);
  color: var(--red-dark);
}
.nav-item.active .nav-icon { color: var(--red); }
.nav-icon { font-size: 17px; width: 20px; text-align: center; color: var(--muted); }
.nav-count {
  margin-right: auto;
  font-size: 11px;
  font-weight: 700;
  background: var(--red);
  color: white;
  border-radius: 10px;
  padding: 1px 7px;
  min-width: 20px; text-align: center;
}
.nav-count.green { background: var(--green); }

.sidebar-accounts {
  border-top: 1px solid var(--border);
  padding: 12px 14px;
}
.sidebar-accounts .sa-label { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 1px; margin-bottom: 8px; }
.account-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 6px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background .1s;
}
.account-item:hover { background: var(--bg); }
.account-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.account-name { font-size: 12.5px; font-weight: 600; color: var(--ink2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ─── MAIN ─── */
#main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ─── EMAIL LIST ─── */
#email-list {
  width: 320px;
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  background: var(--surface2);
  flex-shrink: 0;
}
.list-toolbar {
  height: var(--toolbar-h);
  display: flex; align-items: center;
  padding: 0 14px; gap: 8px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.list-toolbar .folder-title {
  font-size: 16px; font-weight: 700;
  color: var(--ink);
  flex: 1;
}
.tb-btn {
  width: 30px; height: 30px; border-radius: var(--radius-sm);
  border: none; background: none; cursor: pointer;
  color: var(--muted); font-size: 15px;
  display: grid; place-items: center;
  transition: background .1s, color .1s;
}
.tb-btn:hover { background: var(--bg); color: var(--text); }

.email-items { flex: 1; overflow-y: auto; }
.email-items::-webkit-scrollbar { width: 4px; }
.email-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.email-item {
  padding: 13px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
  position: relative;
  display: flex; flex-direction: column; gap: 4px;
}
.email-item:hover { background: var(--gold-light); }
.email-item.active { background: #FFF3F5; border-right: 3px solid var(--red); }
.email-item.unread .ei-subject { font-weight: 800; color: var(--ink); }
.email-item.unread::before {
  content: '';
  position: absolute; right: 0; top: 0; bottom: 0;
  width: 3px; background: var(--red);
  border-radius: 0 3px 3px 0;
}
.ei-row1 { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
.ei-from { font-size: 13px; font-weight: 700; color: var(--ink2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ei-time { font-size: 11px; color: var(--muted); flex-shrink: 0; }
.ei-subject { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ei-preview { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ei-tags { display: flex; gap: 4px; margin-top: 2px; }
.ei-tag {
  font-size: 10px; font-weight: 700; padding: 1px 6px;
  border-radius: 9px;
}
.tag-red { background: var(--red-light); color: var(--red-dark); }
.tag-green { background: var(--green-light); color: var(--green); }
.tag-gold { background: var(--gold-light); color: #8a6a00; }

/* ─── EMAIL DETAIL / COMPOSE ─── */
#detail-pane {
  flex: 1;
  display: flex; flex-direction: column;
  overflow: hidden;
  background: var(--surface);
}
.detail-toolbar {
  height: var(--toolbar-h);
  display: flex; align-items: center;
  padding: 0 20px; gap: 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.dtb-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 13px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  font-family: var(--font);
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text);
  transition: background .1s, border-color .1s;
}
.dtb-btn:hover { background: var(--bg); border-color: #c5c5d8; }
.dtb-btn.primary {
  background: var(--green);
  border-color: var(--green);
  color: white;
  box-shadow: 0 2px 8px rgba(0,92,42,.25);
}
.dtb-btn.primary:hover { background: var(--green-mid); }
.dtb-btn.danger { color: var(--red); }
.dtb-btn.danger:hover { background: var(--red-light); border-color: var(--red-light); }
.detail-spacer { flex: 1; }

/* Reading pane */
#reading-pane {
  flex: 1;
  overflow-y: auto;
  padding: 32px 40px;
}
#reading-pane::-webkit-scrollbar { width: 5px; }
#reading-pane::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
#reading-pane .rp-empty {
  height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--muted); gap: 14px;
}
#reading-pane .rp-empty .big-icon { font-size: 64px; opacity: .3; }
#reading-pane .rp-empty p { font-size: 15px; }

.msg-header {
  border-bottom: 1px solid var(--border);
  padding-bottom: 22px;
  margin-bottom: 28px;
}
.msg-subject {
  font-family: 'Amiri', serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 16px;
  line-height: 1.4;
}
.msg-meta { display: flex; align-items: center; gap: 14px; }
.msg-avatar {
  width: 46px; height: 46px; border-radius: 50%;
  display: grid; place-items: center;
  font-size: 20px; font-weight: 800; color: white;
  flex-shrink: 0;
}
.msg-sender { flex: 1; }
.msg-from-name { font-size: 14px; font-weight: 700; color: var(--ink); }
.msg-from-email { font-size: 12px; color: var(--muted); margin-top: 2px; }
.msg-date { font-size: 12px; color: var(--muted); }
.msg-body {
  font-size: 15px;
  line-height: 1.85;
  color: var(--text);
  white-space: pre-wrap;
}

/* Compose */
#compose-pane {
  flex: 1;
  overflow-y: auto;
  padding: 28px 40px;
  display: none;
}
#compose-pane.active { display: block; }
#compose-pane::-webkit-scrollbar { width: 5px; }
#compose-pane::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.compose-header {
  font-family: 'Amiri', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 22px;
  display: flex; align-items: center; gap: 10px;
}
.compose-form { display: flex; flex-direction: column; gap: 0; }
.cf-field {
  display: flex; align-items: center;
  border-bottom: 1px solid var(--border);
  padding: 10px 0;
  gap: 12px;
}
.cf-label { font-size: 12px; font-weight: 700; color: var(--muted); width: 46px; flex-shrink: 0; text-align: right; }
.cf-input {
  flex: 1;
  border: none; outline: none;
  font-family: var(--font);
  font-size: 14px;
  color: var(--text);
  background: transparent;
}
.cf-input::placeholder { color: #b0b0c0; }
.cf-body {
  margin-top: 16px;
  min-height: 280px;
  border: none; outline: none;
  font-family: var(--font);
  font-size: 15px;
  color: var(--text);
  line-height: 1.8;
  resize: none;
  width: 100%;
  background: transparent;
}
.cf-body::placeholder { color: #c0c0d0; }
.compose-actions {
  display: flex; gap: 10px; margin-top: 20px; align-items: center;
}
.ca-btn {
  padding: 10px 22px;
  border-radius: 22px;
  border: none; cursor: pointer;
  font-family: var(--font);
  font-size: 13.5px;
  font-weight: 700;
  transition: all .15s;
}
.ca-send {
  background: var(--red);
  color: white;
  box-shadow: 0 3px 10px rgba(200,16,46,.3);
}
.ca-send:hover { background: var(--red-dark); transform: translateY(-1px); }
.ca-draft {
  background: var(--surface);
  border: 1.5px solid var(--border) !important;
  color: var(--text);
}
.ca-draft:hover { background: var(--bg); }
.ca-discard { background: none; border: none; color: var(--muted); font-size: 12.5px; cursor: pointer; }
.ca-discard:hover { color: var(--red); }

/* ─── RULES PANEL ─── */
#rules-panel {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  display: none; align-items: center; justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(4px);
}
#rules-panel.open { display: flex; }
.rules-modal {
  background: var(--surface);
  border-radius: var(--radius);
  width: 520px;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: var(--shadow-md);
}
.rules-modal::-webkit-scrollbar { width: 4px; }
.rules-modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--surface); z-index: 1;
}
.modal-title { font-size: 17px; font-weight: 800; color: var(--ink); }
.modal-close { border: none; background: none; cursor: pointer; font-size: 20px; color: var(--muted); line-height: 1; }
.modal-close:hover { color: var(--red); }
.modal-body { padding: 20px 24px; }
.add-rule-form { display: flex; gap: 8px; margin-bottom: 20px; }
.ar-input {
  flex: 1; padding: 9px 13px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font); font-size: 13px; color: var(--text);
  outline: none; transition: border-color .15s;
}
.ar-input:focus { border-color: var(--red); }
.ar-select {
  padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font); font-size: 13px; color: var(--text);
  outline: none; cursor: pointer; background: var(--surface);
  transition: border-color .15s;
}
.ar-select:focus { border-color: var(--red); }
.ar-add {
  padding: 9px 16px;
  background: var(--red); color: white; border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font); font-size: 13px; font-weight: 700;
  cursor: pointer; transition: background .15s;
}
.ar-add:hover { background: var(--red-dark); }
.rules-list { display: flex; flex-direction: column; gap: 8px; }
.rule-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  background: var(--bg); border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}
.rule-info { display: flex; align-items: center; gap: 10px; font-size: 13px; }
.rule-kw { font-weight: 700; color: var(--ink); }
.rule-arrow { color: var(--muted); }
.rule-folder { font-weight: 700; color: var(--green); }
.rule-del {
  border: none; background: none; cursor: pointer;
  font-size: 16px; color: var(--muted); transition: color .1s;
}
.rule-del:hover { color: var(--red); }

/* ─── TOAST ─── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);
  background: var(--ink);
  color: white;
  padding: 11px 22px;
  border-radius: 22px;
  font-size: 13px; font-weight: 600;
  box-shadow: var(--shadow-md);
  transition: transform .28s cubic-bezier(.4,0,.2,1), opacity .28s;
  opacity: 0;
  z-index: 2000;
  pointer-events: none;
  white-space: nowrap;
}
#toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* ─── SCROLLBARS ─── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d5d5e0; border-radius: 4px; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="logo">
    <div class="logo-icon">🕊️</div>
    <div>
      <div class="logo-text">حمام</div>
      <div class="logo-sub">بريدك العربي</div>
    </div>
  </div>
  <div class="header-search">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="ابحث في رسائلك..." oninput="filterEmails()">
  </div>
  <div class="header-actions">
    <button class="hbtn" title="الإعدادات">⚙️</button>
    <button class="hbtn" onclick="openRules()" title="قواعد التصنيف">📋</button>
    <button class="hbtn" title="إشعارات"><span class="badge"></span>🔔</button>
    <button id="installBtn" class="hbtn" style="display:none;background:rgba(255,255,255,.25);width:auto;padding:0 12px;border-radius:16px;font-size:12px;font-weight:700;gap:5px;" onclick="installApp()" title="تثبيت التطبيق">
      📲 تثبيت
    </button>
    <div class="avatar" title="أحمد">أ</div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <button class="compose-btn" onclick="openCompose()">✏️ &nbsp; إنشاء رسالة</button>

    <div class="sidebar-nav">
      <div class="nav-section">الصناديق</div>
      <div class="nav-item active" onclick="showFolder('inbox', this)" data-folder="inbox">
        <span class="nav-icon">📥</span> الوارد
        <span class="nav-count" id="count-inbox">2</span>
      </div>
      <div class="nav-item" onclick="showFolder('sent', this)" data-folder="sent">
        <span class="nav-icon">📤</span> المرسلة
        <span class="nav-count green" id="count-sent" style="display:none">0</span>
      </div>
      <div class="nav-item" onclick="showFolder('drafts', this)" data-folder="drafts">
        <span class="nav-icon">📝</span> المسودات
        <span class="nav-count" id="count-drafts" style="display:none;background:#888">0</span>
      </div>
      <div class="nav-item" onclick="showFolder('trash', this)" data-folder="trash">
        <span class="nav-icon">🗑️</span> المهملات
      </div>

      <div class="nav-section">الفئات</div>
      <div class="nav-item">
        <span class="nav-icon">⭐</span> مميزة
      </div>
      <div class="nav-item">
        <span class="nav-icon">🏷️</span> ترويجية
      </div>
      <div class="nav-item">
        <span class="nav-icon">📢</span> إشعارات
      </div>
    </div>

    <div class="sidebar-accounts">
      <div class="sa-label">الحسابات</div>
      <div class="account-item">
        <div class="account-dot" style="background:var(--red)"></div>
        <div class="account-name">أحمد_حمام.زجل</div>
      </div>
      <div class="account-item">
        <div class="account-dot" style="background:var(--green)"></div>
        <div class="account-name">ليلى_حمام.زجل</div>
      </div>
      <div class="account-item">
        <div class="account-dot" style="background:var(--gold)"></div>
        <div class="account-name">رسائلك_حمام.زجل</div>
      </div>
    </div>
  </div>

  <!-- EMAIL LIST -->
  <div id="email-list">
    <div class="list-toolbar">
      <span class="folder-title" id="folderTitle">الوارد</span>
      <button class="tb-btn" title="تحديث">🔄</button>
      <button class="tb-btn" title="فرز">⇅</button>
      <button class="tb-btn" title="تصفية">⊟</button>
    </div>
    <div class="email-items" id="emailItems"></div>
  </div>

  <!-- DETAIL PANE -->
  <div id="detail-pane">
    <div class="detail-toolbar" id="detailToolbar">
      <span style="color:var(--muted);font-size:13px">اختر رسالة للقراءة</span>
    </div>
    <div id="reading-pane">
      <div class="rp-empty">
        <div class="big-icon">🕊️</div>
        <p>لا توجد رسالة محددة</p>
      </div>
    </div>
    <div id="compose-pane"></div>
  </div>
</div>

<!-- RULES PANEL -->
<div id="rules-panel">
  <div class="rules-modal">
    <div class="modal-header">
      <span class="modal-title">📋 قواعد التصنيف التلقائي</span>
      <button class="modal-close" onclick="closeRules()">✕</button>
    </div>
    <div class="modal-body">
      <div class="add-rule-form">
        <input type="text" id="newKeyword" class="ar-input" placeholder="كلمة مفتاحية...">
        <select id="newFolder" class="ar-select">
          <option value="inbox">الوارد</option>
          <option value="sent">المرسلة</option>
          <option value="drafts">المسودات</option>
          <option value="trash">المهملات</option>
        </select>
        <button class="ar-add" onclick="addRule()">إضافة</button>
      </div>
      <div class="rules-list" id="rulesList"></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
const FOLDER_NAMES = { inbox: 'الوارد', sent: 'المرسلة', drafts: 'المسودات', trash: 'المهملات' };
const AVATAR_COLORS = ['#C8102E','#005C2A','#C49A28','#6A4C93','#0A6E9A','#B5451B'];

let emails = {
  inbox: [
    { id: 1, from: 'أحمد الزهراني', addr: 'ahmed@hamam.zjl', subject: 'مرحباً، كيف حالك؟', body: 'أتمنى أن تكون بخير.\n\nأردت فقط أن أطمئن عليك وأسألك عن أحوالك في العمل الجديد. أرجو أن تكتب لي قريباً.\n\nتحياتي،\nأحمد', time: '10:24', unread: true, tags: ['مهم'] },
    { id: 2, from: 'ليلى العمري', addr: 'layla@hamam.zjl', subject: 'موعد الاجتماع القادم', body: 'السلام عليكم،\n\nأود تذكيركم بموعد اجتماع الفريق يوم الثلاثاء القادم الساعة العاشرة صباحاً في قاعة الاجتماعات الرئيسية.\n\nيرجى الحضور في الوقت المحدد.\n\nمع التحية،\nليلى', time: '09:11', unread: true, tags: ['عمل'] },
  ],
  sent: [], drafts: [], trash: []
};

let currentFolder = 'inbox';
let currentEmailId = null;
let composing = false;
let autoRules = [
  { keyword: 'تجربة', folder: 'trash' },
  { keyword: 'مهم', folder: 'inbox' }
];

// ── Render emails ──
function renderEmails(filter = '') {
  const container = document.getElementById('emailItems');
  container.innerHTML = '';
  const list = emails[currentFolder];
  const filtered = filter
    ? list.filter(e => e.subject.includes(filter) || e.body.includes(filter) || e.from.includes(filter))
    : list;

  if (!filtered.length) {
    container.innerHTML = `<div style="padding:40px;text-align:center;color:var(--muted)">
      <div style="font-size:40px;margin-bottom:12px">📭</div>
      <div style="font-size:14px">لا توجد رسائل</div>
    </div>`;
    return;
  }

  filtered.forEach(email => {
    const div = document.createElement('div');
    div.className = 'email-item' + (email.unread ? ' unread' : '') + (email.id === currentEmailId ? ' active' : '');
    const color = AVATAR_COLORS[email.from.charCodeAt(0) % AVATAR_COLORS.length];
    const initial = email.from.charAt(0);
    div.innerHTML = `
      <div class="ei-row1">
        <span class="ei-from">${email.from}</span>
        <span class="ei-time">${email.time}</span>
      </div>
      <div class="ei-subject">${email.subject}</div>
      <div class="ei-preview">${email.body.split('\n')[0]}</div>
      ${email.tags ? `<div class="ei-tags">${email.tags.map(t => `<span class="ei-tag tag-${tagColor(t)}">${t}</span>`).join('')}</div>` : ''}
    `;
    div.onclick = () => openEmail(email);
    container.appendChild(div);
  });
  updateCounts();
}

function tagColor(t) {
  if (t === 'مهم') return 'red';
  if (t === 'عمل') return 'green';
  return 'gold';
}

function updateCounts() {
  const fi = emails.inbox.filter(e => e.unread).length;
  const fs = emails.sent.length;
  const fd = emails.drafts.length;
  const ci = document.getElementById('count-inbox');
  const cs = document.getElementById('count-sent');
  const cd = document.getElementById('count-drafts');
  if (fi > 0) { ci.textContent = fi; ci.style.display = ''; } else { ci.style.display = 'none'; }
  if (fs > 0) { cs.textContent = fs; cs.style.display = ''; } else { cs.style.display = 'none'; }
  if (fd > 0) { cd.textContent = fd; cd.style.display = ''; } else { cd.style.display = 'none'; }
}

// ── Folder ──
function showFolder(folder, el) {
  currentFolder = folder;
  currentEmailId = null;
  composing = false;
  document.getElementById('folderTitle').textContent = FOLDER_NAMES[folder];
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  renderEmails();
  resetDetail();
}

function filterEmails() {
  renderEmails(document.getElementById('searchInput').value);
}

// ── Open email ──
function openEmail(email) {
  email.unread = false;
  currentEmailId = email.id;
  composing = false;

  // toolbar
  const tb = document.getElementById('detailToolbar');
  tb.innerHTML = `
    <button class="dtb-btn" onclick="replyEmail()">↩️ رد</button>
    <button class="dtb-btn" onclick="replyEmail()">↪️ إعادة إرسال</button>
    <div class="detail-spacer"></div>
    <button class="dtb-btn" onclick="archiveEmail(${email.id})">📂 أرشفة</button>
    <button class="dtb-btn danger" onclick="deleteEmail(${email.id})">🗑️ حذف</button>
  `;

  const rp = document.getElementById('reading-pane');
  const cp = document.getElementById('compose-pane');
  rp.style.display = 'block';
  cp.style.display = 'none';
  cp.classList.remove('active');

  const color = AVATAR_COLORS[email.from.charCodeAt(0) % AVATAR_COLORS.length];
  const initial = email.from.charAt(0);

  rp.innerHTML = `
    <div class="msg-header">
      <div class="msg-subject">${email.subject}</div>
      <div class="msg-meta">
        <div class="msg-avatar" style="background:${color}">${initial}</div>
        <div class="msg-sender">
          <div class="msg-from-name">${email.from}</div>
          <div class="msg-from-email">${email.addr || email.from}</div>
        </div>
        <div class="msg-date">اليوم ${email.time}</div>
      </div>
    </div>
    <div class="msg-body">${email.body}</div>
  `;

  renderEmails(document.getElementById('searchInput').value);
}

// ── Actions ──
function archiveEmail(id) {
  const list = emails[currentFolder];
  const idx = list.findIndex(e => e.id === id);
  if (idx < 0) return;
  list.splice(idx, 1);
  currentEmailId = null;
  renderEmails();
  resetDetail();
  toast('تم أرشفة الرسالة');
}

function deleteEmail(id) {
  const list = emails[currentFolder];
  const idx = list.findIndex(e => e.id === id);
  if (idx < 0) return;
  const [moved] = list.splice(idx, 1);
  moved.unread = false;
  emails.trash.push(moved);
  currentEmailId = null;
  renderEmails();
  resetDetail();
  toast('تم نقل الرسالة إلى المهملات');
}

function resetDetail() {
  document.getElementById('detailToolbar').innerHTML = `<span style="color:var(--muted);font-size:13px">اختر رسالة للقراءة</span>`;
  document.getElementById('reading-pane').innerHTML = `
    <div class="rp-empty">
      <div class="big-icon">🕊️</div>
      <p>لا توجد رسالة محددة</p>
    </div>`;
  document.getElementById('compose-pane').style.display = 'none';
  document.getElementById('reading-pane').style.display = 'block';
}

// ── Compose ──
function openCompose() {
  composing = true;
  currentEmailId = null;
  const tb = document.getElementById('detailToolbar');
  tb.innerHTML = `<span style="color:var(--ink);font-size:14px;font-weight:700">✏️ رسالة جديدة</span>`;

  const rp = document.getElementById('reading-pane');
  const cp = document.getElementById('compose-pane');
  rp.style.display = 'none';
  cp.style.display = 'block';

  cp.innerHTML = `
    <div class="compose-header">✏️ إنشاء رسالة جديدة</div>
    <div class="compose-form">
      <div class="cf-field">
        <span class="cf-label">إلى</span>
        <input type="text" id="cfTo" class="cf-input" placeholder="عنوان المستلم">
      </div>
      <div class="cf-field">
        <span class="cf-label">نسخة</span>
        <input type="text" id="cfCc" class="cf-input" placeholder="نسخة إلى...">
      </div>
      <div class="cf-field">
        <span class="cf-label">الموضوع</span>
        <input type="text" id="cfSubject" class="cf-input" placeholder="موضوع الرسالة">
      </div>
      <textarea id="cfBody" class="cf-body" placeholder="اكتب رسالتك هنا..."></textarea>
    </div>
    <div class="compose-actions">
      <button class="ca-btn ca-send" onclick="sendEmail()">📤 إرسال</button>
      <button class="ca-btn ca-draft" onclick="saveDraft()">💾 حفظ كمسودة</button>
      <button class="ca-discard" onclick="resetDetail()">إلغاء</button>
    </div>
  `;
  renderEmails();
}

function replyEmail() {
  openCompose();
}

function sendEmail() {
  const to = (document.getElementById('cfTo')||{}).value?.trim();
  const subject = (document.getElementById('cfSubject')||{}).value?.trim();
  const body = (document.getElementById('cfBody')||{}).value?.trim();
  if (!to || !subject || !body) { toast('⚠️ يرجى ملء جميع الحقول'); return; }

  let folder = 'sent';
  autoRules.forEach(rule => { if ((subject + body).includes(rule.keyword)) folder = rule.folder; });

  const now = new Date();
  const time = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  emails[folder].push({ id: Date.now(), from: to, addr: to, subject, body, time, unread: false, tags: [] });
  toast('✅ تم إرسال الرسالة بنجاح');
  resetDetail();
  updateCounts();
}

function saveDraft() {
  const to = (document.getElementById('cfTo')||{}).value?.trim() || 'مسودة';
  const subject = (document.getElementById('cfSubject')||{}).value?.trim() || 'بدون موضوع';
  const body = (document.getElementById('cfBody')||{}).value?.trim() || '';
  const now = new Date();
  const time = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  emails.drafts.push({ id: Date.now(), from: to, addr: to, subject, body, time, unread: false, tags: ['مسودة'] });
  toast('💾 تم حفظ المسودة');
  resetDetail();
  updateCounts();
}

// ── Rules ──
function openRules() { document.getElementById('rules-panel').classList.add('open'); renderRules(); }
function closeRules() { document.getElementById('rules-panel').classList.remove('open'); }

function renderRules() {
  const list = document.getElementById('rulesList');
  list.innerHTML = '';
  if (!autoRules.length) {
    list.innerHTML = `<div style="text-align:center;color:var(--muted);padding:20px;font-size:13px">لا توجد قواعد بعد</div>`;
    return;
  }
  autoRules.forEach((rule, i) => {
    const div = document.createElement('div');
    div.className = 'rule-row';
    div.innerHTML = `
      <div class="rule-info">
        <span class="rule-kw">"${rule.keyword}"</span>
        <span class="rule-arrow">→</span>
        <span class="rule-folder">${FOLDER_NAMES[rule.folder] || rule.folder}</span>
      </div>
      <button class="rule-del" onclick="deleteRule(${i})" title="حذف">✕</button>
    `;
    list.appendChild(div);
  });
}

function addRule() {
  const kw = document.getElementById('newKeyword').value.trim();
  const folder = document.getElementById('newFolder').value;
  if (!kw) { toast('⚠️ أدخل كلمة مفتاحية'); return; }
  autoRules.push({ keyword: kw, folder });
  document.getElementById('newKeyword').value = '';
  renderRules();
  toast('✅ تمت إضافة القاعدة');
}

function deleteRule(i) {
  autoRules.splice(i, 1);
  renderRules();
}

// ── Toast ──
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── Simulated new messages ──
setInterval(() => {
  const msgs = [
    { from: 'رسائل_حمام.زجل', addr: 'hamam@hamam.zjl', subject: 'رسالة جديدة واردة', body: 'هذه رسالة تجريبية تلقائية.\nشكراً لاستخدامك حمام بريد.' },
    { from: 'فريق الدعم', addr: 'support@hamam.zjl', subject: 'تحديث جديد متاح', body: 'يسعدنا إعلامكم بإصدار تحديث جديد لخدمة حمام بريد.' },
  ];
  const m = msgs[Math.floor(Math.random() * msgs.length)];
  const now = new Date();
  const time = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  let folder = 'inbox';
  autoRules.forEach(rule => { if ((m.subject + m.body).includes(rule.keyword)) folder = rule.folder; });
  emails[folder].push({ id: Date.now(), ...m, time, unread: true, tags: [] });
  if (currentFolder === folder) renderEmails(document.getElementById('searchInput').value);
  updateCounts();
  toast('🔔 رسالة جديدة: ' + m.subject);
}, 30000);

// ── Init ──
renderEmails();
updateCounts();

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(result => {
      if (result.outcome === 'accepted') toast('🎉 جاري التثبيت...');
      deferredPrompt = null;
    });
  }
}

// ── PWA: تسجيل Service Worker ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .then(() => console.log('✅ Service Worker مُسجَّل'))
      .catch(err => console.log('❌ فشل التسجيل:', err));
  });
}

// ── PWA: زر التثبيت ──
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // أظهر زر التثبيت
  const btn = document.getElementById('installBtn');
  if (btn) btn.style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  toast('🎉 تم تثبيت حمام على هاتفك!');
  const btn = document.getElementById('installBtn');
  if (btn) btn.style.display = 'none';
});
</script>
</body>
</html>
